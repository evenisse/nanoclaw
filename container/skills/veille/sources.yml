# Sources RSS pour la veille tech francophone
# Ajouter une source : copier un bloc ci-dessous avec name + url
# categories : tags séparés par des virgules (ex: dev, linux, devops)

sources:
  - name: Human Coders News
    url: https://news.humancoders.com/items/feed.rss
    site: https://news.humancoders.com
    description: Actualités dev collaboratives par et pour les développeurs
    categories: dev, web, communauté

  - name: Journal du Hacker
    url: https://www.journalduhacker.net/rss
    site: https://www.journalduhacker.net
    description: Agrégateur communautaire de news tech francophones
    categories: dev, linux, communauté

  - name: Dépêches LinuxFr.org
    url: https://linuxfr.org/news.atom
    site: https://linuxfr.org/
    description: Actualités du Libre et Open Source
    categories: linux, open-source, dev

  - name: Guillaume Lours
    url: https://lours.me/index.xml
    site: https://lours.me
    description: Docker compose and sandbox
    categories: devops, docker

  - name: Philippe Charriere
    url: https://k33g.org/feed.xml
    site: https://k33g.org
    description: Blog de Philippe Charriere
    categories: dev, ia, web

  - name: IT-Connect
    url: https://www.it-connect.fr/feed/
    site: https://www.it-connect.fr/
    description: Actualités IT & Tech, tutoriels en administration système, réseau et cybersécurité
    categories: sécurité, réseau, sysadmin

  - name: The Hacker News
    url: https://feeds.feedburner.com/TheHackersNews
    site: https://thehackernews.com
    description: Actualités cybersécurité, vulnérabilités et menaces
    categories: sécurité

  - name: Ubuntu Security Notices
    url: https://ubuntu.com/security/notices/rss.xml
    site: https://ubuntu.com/security/notices
    description: Avis de sécurité officiels Ubuntu
    categories: sécurité, linux
